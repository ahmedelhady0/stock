<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حركة مواد جديدة - نظام مخزن شركة العزل</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div class="container p-6 md:p-8 w-full max-w-2xl mx-auto fade-in">
        <a href="home.html" class="back-link block mb-4">→ رجوع للرئيسية</a>

        <div class="flex justify-between items-center border-b pb-3 mb-5">
            <h1 class="text-xl font-bold text-gray-800">➕ طلب حركة مواد جديد</h1>
            <span id="motionIDDisplay" class="text-xs bg-blue-100 text-blue-800 font-bold px-3 py-1 rounded-full">جاري التوليد...</span>
        </div>

        <div class="space-y-5 section-card p-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">نوع الحركة</label>
                <select id="motionType" class="input-field block w-full p-3">
                    <option value="استلام من مورد">استلام من مورد (وارد للموقع)</option>
                    <option value="صرف داخلي">صرف داخلي للموقع (مستهلك)</option>
                    <option value="مرتجع من الموقع">مرتجع من الموقع (إلى المستودع)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">المشروع</label>
                <select id="matProject" required class="input-field block w-full p-3">
                    <option value="">جاري تحميل المشاريع من الشيت...</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">المرحلة</label>
                <select id="matPhase" required class="input-field block w-full p-3 disabled:bg-gray-100" disabled>
                    <option value="">اختر المشروع أولاً...</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">المورد / الجهة المستلم منها</label>
                    <select id="matSupplier" class="input-field block w-full p-3">
                        <option value="">تحميل الموردين...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">اسم المشرف (مُدخل البيانات)</label>
                    <input type="text" id="createdBy" required class="input-field block w-full p-3" placeholder="أدخل اسمك الثنائي">
                </div>
            </div>

            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">📦 المواد المتوفرة لهذه المرحلة (أدخل الكمية المستلمة)</h3>
                <div id="dynamicMaterialsContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <p class="text-gray-400 text-xs text-center col-span-full py-4">يرجى تحديد المشروع والمرحلة لعرض المواد والكميات.</p>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">ملاحظات / روابط الفواتير والمرفقات</label>
                <textarea id="motionNotes" rows="2" class="input-field block w-full p-3" placeholder="اكتب أي تفاصيل إضافية هنا..."></textarea>
            </div>

            <div class="flex gap-3 pt-2">
                <button onclick="location.reload()" class="w-1/3 py-3 font-bold bg-gray-200 text-gray-700 rounded-xl hover:bg-gray-300 transition">تفريغ</button>
                <button id="submitBtn" onclick="submitLogOrder()" class="w-2/3 py-3 font-bold bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition disabled:bg-gray-400" disabled>حفظ وإرسال للشيت</button>
            </div>
        </div>
    </div>

    <script src="deliveryService.js"></script>
</body>
</html>
