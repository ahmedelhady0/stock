<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استلام مواد جديد - نظام مخزن شركة العزل</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen bg-gradient-to-br from-indigo-50 to-purple-50">
    <div class="container p-6 md:p-8 w-full max-w-2xl mx-auto fade-in">
        <a href="home.html" class="back-link block mb-4">→ رجوع للرئيسية</a>

        <h1 class="text-2xl font-bold text-center mb-6 text-emerald-700">📦 استلام مواد جديد</h1>

        <div class="section-card p-6 space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">المشروع</label>
                <select id="matProject" required class="input-field block w-full p-3"></select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">المرحلة</label>
                <select id="matPhase" required class="input-field block w-full p-3" disabled>
                    <option value="">اختر المشروع أولاً</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">المورد</label>
                    <select id="matSupplier" class="input-field block w-full p-3"></select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">اسم المشرف</label>
                    <input type="text" id="createdBy" required class="input-field block w-full p-3" placeholder="اسمك الثنائي">
                </div>
            </div>

            <div class="bg-emerald-50 p-5 rounded-2xl border border-emerald-100">
                <h3 class="text-sm font-bold text-emerald-800 mb-4">المواد (أدخل الكميات المستلمة)</h3>
                <div id="dynamicMaterialsContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- يتم ملؤها ديناميكياً -->
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">ملاحظات</label>
                <textarea id="motionNotes" rows="3" class="input-field block w-full p-3" placeholder="فاتورة، ملاحظات، إلخ..."></textarea>
            </div>

            <div class="flex gap-3 pt-4">
                <button onclick="location.reload()" class="flex-1 py-4 font-bold bg-gray-200 text-gray-700 rounded-2xl">تفريغ النموذج</button>
                <button id="submitBtn" onclick="submitReceipt()" class="flex-1 py-4 font-bold bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700 disabled:bg-gray-400" disabled>
                    حفظ الاستلام
                </button>
            </div>
        </div>
    </div>

    <div id="messageBox" class="fixed inset-0 modal-backdrop hidden items-center justify-center p-4">
        <div class="modal-content p-6 shadow-xl w-full max-w-sm text-center">
            <p id="messageText" class="text-gray-800 font-medium mb-4"></p>
            <button id="closeMessageBtn" class="w-full py-3 px-6 btn-primary">إغلاق</button>
        </div>
    </div>

    <script type="module" src="deliveryService.js"></script>
</body>
</html>
