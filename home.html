<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - منظومة مواد شركة EXO</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div class="container p-6 md:p-8 w-full max-w-2xl mx-auto fade-in bg-white shadow-xl rounded-2xl">
        
        <header class="mb-6">
            <div class="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                <span id="userWelcome" class="text-gray-700 font-bold">مرحباً بك في نظام EXO</span>
                <button type="button" id="signOutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg font-semibold text-sm hover:bg-red-600 transition">خروج</button>
            </div>
        </header>

        <h1 class="text-2xl font-bold text-center text-gray-800 mb-8">إدارة طلبات وحركات المواد</h1>

        <div class="grid grid-cols-1 gap-4 mb-8">
            <a href="deliveries.html" class="flex items-center gap-4 p-5 bg-blue-50 border-2 border-blue-200 rounded-xl hover:bg-blue-100 transition group">
                <span class="text-3xl bg-blue-500 text-white p-3 rounded-xl shadow-md group-hover:scale-105 transition">➕</span>
                <div>
                    <div class="text-lg font-bold text-blue-900">طلب حركة مواد جديد</div>
                    <div class="text-sm text-blue-700">تسجيل (استلام من مورد / صرف للموقع / مرتجع للمخزن) دفعة واحدة</div>
                </div>
            </a>

            <a href="history.html" class="flex items-center gap-4 p-5 bg-purple-50 border-2 border-purple-200 rounded-xl hover:bg-purple-100 transition group">
                <span class="text-3xl bg-purple-500 text-white p-3 rounded-xl shadow-md group-hover:scale-105 transition">📜</span>
                <div>
                    <div class="text-lg font-bold text-purple-900">سجل الطلبات والحركات</div>
                    <div class="text-sm text-purple-700">متابعة وحساب كميات الحركات المسجلة السابقة</div>
                </div>
            </a>
        </div>

        <div class="bg-gray-50 p-5 rounded-xl border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-md font-bold text-gray-800">آخر حركات النظام (مزامنة مباشرة مع الشيت)</h2>
            </div>
            <div id="recentMovements" class="space-y-3">
                <p class="text-center text-gray-500 text-sm">جاري تحديث البيانات من جوجل شيت...</p>
            </div>
        </div>
    </div>

    <script src="home.js"></script>
</body>
</html>
